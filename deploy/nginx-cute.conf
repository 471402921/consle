# cute pixel console + relay 的 nginx vhost。
#
# 拓扑(2026-05-17 起):
#   :80   → acme-challenge + redirect 到 :443
#   :443  → SSL,按 server_name 分:
#            server_name console.ewow.cn → cute console + relay
#            default_server              → asset-lab (反代 localhost:8001)
#   :18789 → 老 vhost,self-signed cert,保留 1 周作为 fallback,稳定后删
#
# cert:腾讯云 DV 免费证书(到期 2026-08-14,90 天有效)
#   /home/ubuntu/cute/cert/console.ewow.cn_bundle.crt
#   /home/ubuntu/cute/cert/console.ewow.cn.key
# 续期:手动,在腾讯云控制台重申 + 下载 + 覆盖这两个文件 + nginx -s reload

# ─────────────────────────────────────────────────────────────
# :80 — LE / 续期 challenge 留位 + 全部 redirect 到 https
# ─────────────────────────────────────────────────────────────
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name console.ewow.cn ewow.cn www.ewow.cn _;

    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────────────────────
# :443 console.ewow.cn — cute console + relay
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name console.ewow.cn;

    ssl_certificate     /home/ubuntu/cute/cert/console.ewow.cn_bundle.crt;
    ssl_certificate_key /home/ubuntu/cute/cert/console.ewow.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # console SPA
    root /home/ubuntu/cute/console-dist;
    index index.html;
    location / {
        try_files $uri $uri/ /index.html;
    }

    # relay WebSocket。/relay/* → 127.0.0.1:8080/*(strip /relay 前缀)
    location /relay {
        rewrite ^/relay(/.*)?$ $1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
    }

    access_log /var/log/nginx/cute.access.log;
    error_log  /var/log/nginx/cute.error.log;
}

# ─────────────────────────────────────────────────────────────
# :443 default_server fallback — asset-lab 反代到 8001
# 命中条件:IP 直访 https://1.14.190.95/、host header 不是 console.ewow.cn
# ─────────────────────────────────────────────────────────────
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # 复用 console cert(CN 不匹配会有 warn,但 asset-lab 之前就是自签 warn 时代,体验不退化)
    ssl_certificate     /home/ubuntu/cute/cert/console.ewow.cn_bundle.crt;
    ssl_certificate_key /home/ubuntu/cute/cert/console.ewow.cn.key;

    location / {
        proxy_pass https://127.0.0.1:8001;
        proxy_ssl_verify off;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# ─────────────────────────────────────────────────────────────
# :18789 — **主流量路径(2026-05-17 起)**。
# console.ewow.cn:443 被腾讯边缘 anti-scan 间歇 RST(SNI=未备案子域 + 标准 :443),
# iOS 5 次重连必触发,改用非标 :18789 绕过(腾讯 anti-scan 不监控非标端口)。
# cert 换成腾讯 DV(跟 :443 vhost 同一份),server_name 保留 _ 不参与 SNI 匹配。
# 详见 deploy/README.md "已知陷阱 #9"。
# ─────────────────────────────────────────────────────────────
server {
    listen 18789 ssl;
    listen [::]:18789 ssl;
    server_name _;

    ssl_certificate     /home/ubuntu/cute/cert/console.ewow.cn_bundle.crt;
    ssl_certificate_key /home/ubuntu/cute/cert/console.ewow.cn.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    root /home/ubuntu/cute/console-dist;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }

    location /relay {
        rewrite ^/relay(/.*)?$ $1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
    location = /health { proxy_pass http://127.0.0.1:8080/health; }

    access_log /var/log/nginx/cute.access.log;
    error_log  /var/log/nginx/cute.error.log;
}
