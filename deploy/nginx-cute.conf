# cute pixel console + relay 共用 18789 端口的 nginx vhost。
# 装到 /etc/nginx/sites-available/cute.conf,symlink 到 sites-enabled/。
# asset-lab-https.service 仍直占 443,跟本 vhost 互不影响。

server {
    listen 18789 ssl;
    listen [::]:18789 ssl;
    server_name _;

    ssl_certificate     /home/ubuntu/cute/cert.pem;
    ssl_certificate_key /home/ubuntu/cute/key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # console SPA。访问 / 静态站,SPA fallback 走 index.html。
    root /home/ubuntu/cute/console-dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # relay WebSocket。/relay/* → 127.0.0.1:8080/*(strip /relay 前缀)。
    # nginx 必须配 Upgrade + Connection 头,否则 ws 握手失败。
    location /relay {
        rewrite ^/relay(/.*)?$ $1 break;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 健康检查直透。
    location = /health {
        proxy_pass http://127.0.0.1:8080/health;
    }

    # 不在 access log 里记 ws frame 量(只记接口元数据)。
    access_log /var/log/nginx/cute.access.log;
    error_log  /var/log/nginx/cute.error.log;
}
